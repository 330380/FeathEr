<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FeathEr</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #667085;
        --line: #d9e0ea;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 36px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 20px;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        background: var(--accent-dark);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FeathEr</h1>
      <p>一个轻量的在线工具集合。当前提供接口测试与小规模性能观察能力，可填写 URL、Headers 和 Body，查看响应内容与基础性能指标。</p>
      <div class="actions">
        <a href="tester.html">接口测试</a>
        <a href="performance.html">轻量性能测试</a>
      </div>
    </main>
  </body>
</html>
